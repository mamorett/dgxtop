name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── x86_64 Linux (DGX A100 / H100 / B200) ──
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            label: "Linux x86_64 (glibc)"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            label: "Linux x86_64 (static)"

          # ── aarch64 Linux (DGX Spark — NVIDIA Grace ARM CPU) ──
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            label: "Linux ARM64 / DGX Spark (glibc)"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            label: "Linux ARM64 / DGX Spark (static)"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../dgxtop-${{ matrix.target }}.tar.gz dgxtop
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dgxtop-${{ matrix.target }}
          path: dgxtop-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Move all tarballs to release/
          find artifacts -name "*.tar.gz" -exec mv {} release/ \;
          # Generate SHA256 checksums
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
